<h2 id="%E3%82%A4%E3%83%B3%E3%83%A9%E3%82%A4%E3%83%B3%E3%82%B3%E3%83%BC%E3%83%89">インラインコード</h2>
<p>変数 <code>x</code> に値を代入するには <code>x = 42</code> と書きますわ。</p>
<h2 id="%E3%83%96%E3%83%AD%E3%83%83%E3%82%AF%E3%82%B3%E3%83%BC%E3%83%89python">ブロックコード（Python）</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">sentiment_direction</span>(<span class="hljs-params">activations: <span class="hljs-built_in">list</span>[<span class="hljs-built_in">float</span>]</span>) -&gt; <span class="hljs-built_in">float</span>:
    <span class="hljs-string">&quot;&quot;&quot;Compute projection onto sentiment direction.&quot;&quot;&quot;</span>
    mean_pos = <span class="hljs-built_in">sum</span>(activations[:<span class="hljs-built_in">len</span>(activations)//<span class="hljs-number">2</span>])
    mean_neg = <span class="hljs-built_in">sum</span>(activations[<span class="hljs-built_in">len</span>(activations)//<span class="hljs-number">2</span>:])
    <span class="hljs-keyword">return</span> mean_pos - mean_neg
</code></pre>
